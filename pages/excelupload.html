<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalkpad ERP | Bulk Question Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b5998;
            --primary-dark: #2d4373;
            --primary-light: #eef2f7;
            --erp-bg: #e8ecf3;
            --erp-border: #d0d7e5;
            --erp-text: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--erp-bg);
            font-family: Tahoma, Arial, sans-serif;
            color: var(--erp-text);
            font-size: 12px;
        }

        /* ERP Topbar */
        .erp-topbar {
            background-color: var(--primary);
            color: white;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            font-size: 11px;
            height: 35px;
            gap: 15px;
        }

        .erp-container {
            max-width: 1400px;
            margin: 10px auto;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            padding: 15px;
            min-height: 85vh;
        }

        .breadcrumb {
            font-size: 10px;
            margin-bottom: 8px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .erp-section-title {
            background: var(--primary-light);
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--erp-border);
        }

        /* Tools Bar */
        .tools-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* Grid Wrapper and Table */
        .grid-wrapper {
            border: 1px solid var(--erp-border);
            overflow: auto;
            max-height: calc(100vh - 220px);
            background: #fff;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: auto;
        }

        th {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: bold;
            padding: 6px 10px;
            text-align: left;
            border: 1px solid var(--erp-border);
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 11px;
        }

        td {
            border: 1px solid #ddd;
            padding: 0;
            height: 30px;
            vertical-align: middle;
        }

        .row-num {
            background: #f0f0f0;
            font-size: 10px;
            color: #777;
            text-align: center;
            width: 40px;
            border-right: 1px solid var(--erp-border);
        }

        .cell-input {
            width: 100%;
            height: 100%;
            padding: 0 8px;
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            background: transparent;
        }

        .cell-input:focus {
            background: #fff;
            box-shadow: inset 0 0 0 1px var(--primary);
            z-index: 5;
        }

        .cell-select {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            padding: 0 6px;
            font-size: 11px;
            background: transparent;
            cursor: pointer;
        }

        /* Status Badges */
        .status-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 2px;
            font-weight: bold;
            background: #eee;
            color: #999;
        }
        .status-valid { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }

        /* Buttons */
        .btn {
            padding: 4px 12px;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f5f5f5;
            color: #333;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary-dark); }
        .btn-primary:hover { opacity: 0.9; }

        .selected-cell { background: var(--primary-light) !important; box-shadow: inset 0 0 0 1px var(--primary); }
        .selection-active { user-select: none; }
        [contenteditable=true]:empty:before { content: attr(data-placeholder); color: #ccc; font-style: italic; font-size: 10px; }

        #customModalOverlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: #fff; width: 450px; border: 1px solid #666; box-shadow: 0 5px 25px rgba(0,0,0,0.3); }
        .modal-header { background: var(--primary); color: white; padding: 6px 12px; font-weight: bold; font-size: 11px; }
        .modal-body { padding: 20px; font-size: 12px; }
        .modal-actions { background: #f5f5f5; padding: 8px 12px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid #ddd; }
        
        #toastContainer { position: fixed; bottom: 20px; left: 20px; z-index: 11000; display: flex; flex-direction: column; gap: 5px; }
        .toast { background: #333; color: #fff; padding: 8px 15px; border-radius: 2px; font-size: 11px; border-left: 4px solid var(--primary); animation: toastSlideIn 0.3s forwards; }
        @keyframes toastSlideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #loader { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.7); display: none; justify-content: center; align-items: center; z-index: 12000; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Processing Matrix...</div>

    <div class="erp-topbar">
        <span>Session Jan-Jun 2026</span>
        <i class="fas fa-home" style="cursor:pointer;" onclick="location.href='index.html'"></i>
        <i class="fas fa-sign-out-alt" style="cursor:pointer;"></i>
    </div>

    <div class="erp-container">
        <div class="breadcrumb">Home » Exam Creator » Bulk Import Architect</div>
        <div class="erp-section-title">
            <div><i class="fas fa-th-list"></i> Bulk Question Architect (Institutional Matrix)</div>
            <div class="tools-bar">
                <button class="btn" onclick="clearTable()"><i class="fas fa-trash-alt"></i> Wipe Matrix</button>
                <button class="btn" onclick="goBack()"><i class="fas fa-undo"></i> Discard</button>
                <button class="btn btn-primary" onclick="validateAndSave()"><i class="fas fa-cloud-upload-alt"></i> Synchronize Questions</button>
            </div>
        </div>

        <div id="errorSummary" style="display:none; background:#fff2f2; color:#b91c1c; padding:10px; border:1px solid #fecaca; font-size:11px; margin-bottom:10px;"></div>

        <div class="grid-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;">#</th>
                        <th>Title</th>
                        <th style="width:250px;">Question Content</th>
                        <th>Opt 1</th>
                        <th>Opt 2</th>
                        <th>Opt 3</th>
                        <th>Opt 4</th>
                        <th style="width:60px; text-align:center;">Ans</th>
                        <th style="width:120px;">Section</th>
                        <th style="width:50px; text-align:center;">Marks</th>
                        <th style="width:70px; text-align:center;">Status</th>
                    </tr>
                </thead>
                <tbody id="gridBody"></tbody>
            </table>
        </div>
        <div id="rowCounter" style="margin-top:10px; font-size:11px; color:#666;">0 Questions Detected in Architect Range.</div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const headers = ['title', 'text', 'opt1', 'opt2', 'opt3', 'opt4', 'answer', 'section', 'marks'];
        let exams = JSON.parse(localStorage.getItem('exampad_creator_temp')) || { questions: [], sections: ['General'], title: '' };
        const gridBody = document.getElementById('gridBody');
        let isSelecting = false;
        let selectionStart = { r: 0, c: 0 };
        let selectionEnd = { r: 0, c: 0 };

        function initGrid() {
            for (let i = 0; i < 12; i++) addRow();
            
            const firstRowInputs = gridBody.firstChild.querySelectorAll('.cell-input');
            const firstRowSelect = gridBody.firstChild.querySelector('.cell-select');
            
            if (firstRowInputs.length >= 8) {
                firstRowInputs[0].innerText = 'Sample MCQ';
                firstRowInputs[1].innerText = 'Capital of India?';
                firstRowInputs[2].innerText = 'New Delhi';
                firstRowInputs[3].innerText = 'Mumbai';
                firstRowInputs[4].innerText = 'Chennai';
                firstRowInputs[5].innerText = 'Kolkata';
                firstRowInputs[6].innerText = '1';
                firstRowInputs[7].innerText = '4';
                if (firstRowSelect) firstRowSelect.value = 'General';
            }
            validateRealtime();
        }

        function addRow() {
            const rowIndex = gridBody.children.length + 1;
            const tr = document.createElement('tr');
            
            const sectionOptions = (exams.sections && exams.sections.length > 0 ? exams.sections : ['General'])
                .map(s => `<option value="${s}">${s}</option>`).join('');

            const placeholders = {
                'title': 'Brief Title',
                'text': 'Question Content',
                'opt1': 'Choice 1',
                'opt2': 'Choice 2',
                'opt3': 'Choice 3 (Opt)',
                'opt4': 'Choice 4 (Opt)',
                'answer': '1 to 4',
                'marks': 'Points (Int)'
            };

            tr.innerHTML = `
                <td class="row-num" style="text-align: center; color: #999; font-weight: 600; font-size: 0.75rem; user-select: none;">${rowIndex}</td>
                ${headers.map((h, i) => {
                    if (h === 'section') {
                        return `
                            <td class="cell-container" data-row="${rowIndex-1}" data-col="${i}">
                                <select class="cell-select" data-key="${h}" data-row="${rowIndex-1}" data-col="${i}" 
                                    style="width: 100%; border: none; outline: none; background: transparent; height: 100%; padding: 0 16px; font-family: inherit; font-size: inherit; color: inherit; cursor: pointer;">
                                    ${sectionOptions}
                                    <option value="__NEW__" style="font-weight: bold; color: var(--primary);">+ Add New Section...</option>
                                </select>
                            </td>
                        `;
                    }
                    return `
                        <td class="cell-container" data-row="${rowIndex-1}" data-col="${i}">
                            <div class="cell-input" contenteditable="true" data-key="${h}" data-row="${rowIndex-1}" data-col="${i}" data-placeholder="${placeholders[h] || ''}"></div>
                        </td>
                    `;
                }).join('')}
                <td style="padding: 10px; text-align: center; user-select: none;"><span class="status-badge">Empty</span></td>
            `;
            gridBody.appendChild(tr);
            updateCounter();
            
            const inputs = tr.querySelectorAll('.cell-input');
            inputs.forEach(input => {
                input.addEventListener('paste', handlePaste);
                input.addEventListener('input', validateRealtime);
                input.addEventListener('mousedown', startSelection);
                input.addEventListener('mouseover', updateSelection);

                if (input.dataset.key === 'marks' || input.dataset.key === 'answer') {
                    input.addEventListener('keypress', (e) => {
                        if (!/[0-9]/.test(e.key)) e.preventDefault();
                    });
                }

                input.addEventListener('focus', (e) => {
                    clearSelection();
                    e.target.classList.add('focused-cell');
                });
                input.addEventListener('blur', (e) => e.target.classList.remove('focused-cell'));
            });

            // Handle Section Changes
            const select = tr.querySelector('.cell-select');
            if (select) {
                select.addEventListener('change', (e) => {
                    if (e.target.value === '__NEW__') {
                        showPromptModal('Create New Architecture Section', 'Give your new assessment section a clear, academic title.', (newVal) => {
                            if (newVal) {
                                const trimmed = newVal.trim();
                                if (!exams.sections.includes(trimmed)) {
                                    exams.sections.push(trimmed);
                                    updateAllDropdowns(trimmed);
                                } else {
                                    e.target.value = trimmed;
                                }
                            } else {
                                e.target.value = exams.sections[0];
                            }
                        });
                    }
                    validateRealtime();
                });
            }
        }

        function updateAllDropdowns(newVal) {
            document.querySelectorAll('.cell-select').forEach(sel => {
                const currentVal = sel.value;
                sel.innerHTML = `
                    ${exams.sections.map(s => `<option value="${s}">${s}</option>`).join('')}
                    <option value="__NEW__" style="font-weight: bold; color: var(--primary);">+ Add New Section...</option>
                `;
                if (currentVal !== '__NEW__') {
                    sel.value = currentVal;
                } else {
                    sel.value = newVal;
                }
            });
        }

        function startSelection(e) {
            if (e.shiftKey) return;
            isSelecting = true;
            const target = e.target.closest('.cell-container');
            if (!target) return;
            const row = parseInt(target.dataset.row);
            const col = parseInt(target.dataset.col);
            selectionStart = { r: row, c: col };
            selectionEnd = { r: row, c: col };
            updateSelectionStyles();
        }

        function updateSelection(e) {
            if (!isSelecting) return;
            const target = e.target.closest('.cell-container');
            if (!target) return;
            const row = parseInt(target.dataset.row);
            const col = parseInt(target.dataset.col);
            selectionEnd = { r: row, c: col };
            updateSelectionStyles();
        }

        function updateSelectionStyles() {
            clearSelection();
            const minR = Math.min(selectionStart.r, selectionEnd.r);
            const maxR = Math.max(selectionStart.r, selectionEnd.r);
            const minC = Math.min(selectionStart.c, selectionEnd.c);
            const maxC = Math.max(selectionStart.c, selectionEnd.c);

            for (let r = minR; r <= maxR; r++) {
                const tr = gridBody.children[r];
                if (!tr) continue;
                const containers = tr.querySelectorAll('.cell-container');
                for (let c = minC; c <= maxC; c++) {
                    const td = containers[c];
                    if (td) td.classList.add('selected-cell');
                }
            }
        }

        function clearSelection() {
            document.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
        }

        window.addEventListener('mouseup', () => {
            isSelecting = false;
        });

        document.addEventListener('copy', (e) => {
            const minR = Math.min(selectionStart.r, selectionEnd.r);
            const maxR = Math.max(selectionStart.r, selectionEnd.r);
            const minC = Math.min(selectionStart.c, selectionEnd.c);
            const maxC = Math.max(selectionStart.c, selectionEnd.c);

            let copyText = '';
            for (let r = minR; r <= maxR; r++) {
                const tr = gridBody.children[r];
                if (!tr) continue;
                let rowData = [];
                const containers = tr.querySelectorAll('.cell-container');
                for (let c = minC; c <= maxC; c++) {
                    const input = containers[c].querySelector('.cell-input, .cell-select');
                    rowData.push(input ? (input.value || input.innerText) : '');
                }
                copyText += rowData.join('\t') + '\n';
            }

            if (copyText.trim()) {
                e.clipboardData.setData('text/plain', copyText.trim());
                e.preventDefault();
                showToast('Architect Range Copied');
            }
        });

        function handlePaste(e) {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            const rows = text.split(/\r?\n/);
            const targetContainer = e.target.closest('.cell-container');
            const startR = parseInt(targetContainer.dataset.row);
            const startC = parseInt(targetContainer.dataset.col);

            rows.forEach((rowText, rOffset) => {
                const targetR = startR + rOffset;
                if (!gridBody.children[targetR]) addRow();
                
                const tr = gridBody.children[targetR];
                const columns = rowText.split('\t');
                
                columns.forEach((colText, cOffset) => {
                    const targetC = startC + cOffset;
                    const containers = tr.querySelectorAll('.cell-container');
                    if (containers[targetC]) {
                        const input = containers[targetC].querySelector('.cell-input');
                        const select = containers[targetC].querySelector('.cell-select');
                        
                        if (input) input.innerText = colText.trim();
                        if (select) {
                            const val = colText.trim();
                            const option = Array.from(select.options).find(o => o.value.toLowerCase() === val.toLowerCase());
                            if (option) {
                                select.value = option.value;
                            } else if (val) {
                                if (!exams.sections.includes(val)) {
                                    exams.sections.push(val);
                                    updateAllDropdowns(val);
                                }
                                select.value = val;
                            }
                        }
                    }
                });
            });
            
            validateRealtime();
        }

        function validateRealtime() {
            Array.from(gridBody.children).forEach(tr => {
                const title = tr.querySelector('[data-key="title"]').innerText.trim();
                const text = tr.querySelector('[data-key="text"]').innerText.trim();
                const statusCell = tr.lastElementChild;
                
                if (title !== '' || text !== '') {
                    const inputs = Array.from(tr.querySelectorAll('.cell-input'));
                    const select = tr.querySelector('.cell-select');
                    const data = {};
                    inputs.forEach(i => data[i.dataset.key] = i.innerText.trim());
                    data.section = select ? select.value : 'General';
                    
                    const errors = [];
                    if (!data.title) errors.push('Title missing');
                    if (!data.text) errors.push('Question text missing');
                    if (!data.opt1 || !data.opt2) errors.push('Min 2 choices needed');
                    
                    if (!data.answer) {
                        errors.push('Correct Ans missing');
                    } else {
                        const ansInt = parseInt(data.answer);
                        if (isNaN(ansInt) || ansInt < 1 || ansInt > 4) {
                            errors.push('Correct Ans must be 1-4');
                        }
                    }

                    if (!data.marks) {
                        errors.push('Marks missing');
                    } else {
                        const marksInt = parseInt(data.marks);
                        if (isNaN(marksInt) || marksInt < 1) {
                            errors.push('Marks must be positive number');
                        }
                    }

                    if (!data.section || data.section === '__NEW__') errors.push('Select Section');

                    if (errors.length > 0) {
                        statusCell.innerHTML = `<span class="status-badge status-error" title="${errors.join(', ')}">Error</span>`;
                        tr.classList.add('error-row');
                    } else {
                        statusCell.innerHTML = `<span class="status-badge status-valid">Valid</span>`;
                        tr.classList.remove('error-row');
                    }
                } else {
                    statusCell.innerHTML = `<span class="status-badge">Empty</span>`;
                    tr.classList.remove('error-row');
                }
            });
            updateCounter();
        }

        function updateCounter() {
            let active = 0;
            Array.from(gridBody.children).forEach(tr => {
                const title = tr.querySelector('[data-key="title"]').innerText.trim();
                const text = tr.querySelector('[data-key="text"]').innerText.trim();
                if (title !== '' || text !== '') active++;
            });
            document.getElementById('rowCounter').innerText = `${active} Questions Detected`;
        }

        function clearTable() {
            showConfirmModal('Wipe Drafting Matrix', 'This will erase all unsynced data from your current grid session. This action is irreversible.', () => {
                gridBody.innerHTML = '';
                exams = JSON.parse(localStorage.getItem('exampad_creator_temp')) || { questions:[], sections:['General'] };
                initGrid();
                updateCounter();
                showToast('Architect Matrix Cleared');
            });
        }

        function goBack() {
            window.location.href = './exam-creator.html';
        }

        function showProcessing() {
            document.getElementById('loader').style.display = 'flex';
        }

        function hideProcessing() {
            document.getElementById('loader').style.display = 'none';
        }

        function validateAndSave() {
            const rows = Array.from(gridBody.children);
            const validQuestions = [];
            const errorsAtRows = [];

            let foundValid = false;
            rows.forEach((tr, index) => {
                const title = tr.querySelector('[data-key="title"]').innerText.trim();
                const text = tr.querySelector('[data-key="text"]').innerText.trim();
                if (title === '' && text === '') return;

                const inputs = Array.from(tr.querySelectorAll('.cell-input'));
                const select = tr.querySelector('.cell-select');
                const data = {};
                inputs.forEach(i => data[i.dataset.key] = i.innerText.trim());
                data.section = select.value;
                
                let rowErrors = [];
                if (!data.title) rowErrors.push('Title');
                if (!data.text) rowErrors.push('Text');
                if (!data.opt1 || !data.opt2) rowErrors.push('Options');
                const ansInt = parseInt(data.answer);
                if (isNaN(ansInt) || ansInt < 1 || ansInt > 4) rowErrors.push('Ans (1-4)');
                const marksInt = parseInt(data.marks);
                if (isNaN(marksInt) || marksInt < 1) rowErrors.push('Marks (Int)');
                if (!data.section || data.section === '__NEW__') rowErrors.push('Section');

                if (rowErrors.length > 0) {
                    errorsAtRows.push(`Row ${index + 1}: ${rowErrors.join(', ')} missing/invalid`);
                } else {
                    const options = [data.opt1, data.opt2, data.opt3, data.opt4].filter(o => o);
                    let correctlyMappedAnswer = options[ansInt - 1] || options[0];

                    const q = {
                        id: 'q_' + Date.now() + Math.random().toString(36).substr(2, 5),
                        type: 'mcq',
                        heading: data.title,
                        title: `<p>${data.text}</p>`,
                        options: options,
                        correctAnswer: correctlyMappedAnswer,
                        marks: marksInt,
                        section: data.section,
                        timer: 0,
                        teacherNotes: 'Imported via Site Excel Grid'
                    };
                    validQuestions.push(q);
                    foundValid = true;
                }
            });

            if (errorsAtRows.length > 0) {
                const summary = document.getElementById('errorSummary');
                summary.innerHTML = `<i class="fas fa-exclamation-circle"></i> Please fix errors before syncing: <br>${errorsAtRows.join('<br>')}`;
                summary.style.display = 'block';
                summary.scrollIntoView({ behavior: 'smooth' });
                return;
            }

            if (!foundValid) {
                showToast('No active questions found to save!');
                return;
            }

            showProcessing();
            setTimeout(() => {
                validQuestions.forEach(q => {
                    if (!exams.sections.includes(q.section)) {
                        exams.sections.push(q.section);
                    }
                    exams.questions.push(q);
                    if (typeof db !== 'undefined') db.addToQuestionPool(q);
                });

                localStorage.setItem('exampad_creator_temp', JSON.stringify(exams));
                hideProcessing();
                showToast(`Successfully synced ${validQuestions.length} questions! Redirecting...`);
                setTimeout(goBack, 1500);
            }, 1000);
        }

        function showConfirmModal(title, desc, onConfirm) {
            const overlay = document.getElementById('customModalOverlay');
            overlay.innerHTML = `
                <div class="modal-card">
                    <div class="modal-header">CONFIRM ACTION</div>
                    <div class="modal-body">
                        <div style="font-weight:bold; margin-bottom:10px;">${title}</div>
                        <div>${desc}</div>
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-ghost" id="modalCancelBtn">Cancel</button>
                        <button class="btn btn-primary" id="modalConfirmBtn">Proceed</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'flex';
            document.getElementById('modalCancelBtn').onclick = () => { overlay.style.display = 'none'; };
            document.getElementById('modalConfirmBtn').onclick = () => { onConfirm(); overlay.style.display = 'none'; };
        }

        function showPromptModal(title, desc, onConfirm) {
            const overlay = document.getElementById('customModalOverlay');
            overlay.innerHTML = `
                <div class="modal-card">
                    <div class="modal-header">INPUT REQUIRED</div>
                    <div class="modal-body">
                        <div style="font-weight:bold; margin-bottom:10px;">${title}</div>
                        <div style="margin-bottom:15px;">${desc}</div>
                        <input type="text" id="modalPromptInput" style="width:100%; padding:8px; border:1px solid #ccc;" placeholder="Type value here...">
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-ghost" id="modalCancelBtn">Cancel</button>
                        <button class="btn btn-primary" id="modalConfirmBtn">Save</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'flex';
            const input = document.getElementById('modalPromptInput');
            input.focus();
            document.getElementById('modalCancelBtn').onclick = () => { onConfirm(null); overlay.style.display = 'none'; };
            document.getElementById('modalConfirmBtn').onclick = () => { onConfirm(input.value); overlay.style.display = 'none'; };
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        initGrid();

        document.addEventListener('keydown', (e) => {
            const isInput = e.target.classList.contains('cell-input');
            const isSelect = e.target.classList.contains('cell-select');
            if (!isInput && !isSelect) return;

            const r = parseInt(e.target.dataset.row);
            const c = parseInt(e.target.dataset.col);

            if (e.shiftKey && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                if (e.key === 'ArrowUp') selectionEnd.r = Math.max(0, selectionEnd.r - 1);
                if (e.key === 'ArrowDown') selectionEnd.r = Math.min(gridBody.children.length - 1, selectionEnd.r + 1);
                if (e.key === 'ArrowLeft') selectionEnd.c = Math.max(0, selectionEnd.c - 1);
                if (e.key === 'ArrowRight') selectionEnd.c = Math.min(headers.length - 1, selectionEnd.c + 1);
                updateSelectionStyles();
                return;
            }

            if (e.key === 'ArrowRight' && (isSelect || (e.target.innerText && window.getSelection().anchorOffset === e.target.innerText.length) || e.ctrlKey)) {
                const nextTd = e.target.parentElement.nextElementSibling;
                if (nextTd && nextTd.querySelector('.cell-input, .cell-select')) nextTd.querySelector('.cell-input, .cell-select').focus();
            } else if (e.key === 'ArrowLeft' && (isSelect || window.getSelection().anchorOffset === 0 || e.ctrlKey)) {
                const prevTd = e.target.parentElement.previousElementSibling;
                if (prevTd && prevTd.querySelector('.cell-input, .cell-select')) prevTd.querySelector('.cell-input, .cell-select').focus();
            } else if (e.key === 'ArrowDown') {
                const nextTr = e.target.parentElement.parentElement.nextElementSibling;
                if (nextTr && nextTr.children[c+1]) nextTr.children[c+1].querySelector('.cell-input, .cell-select').focus();
            } else if (e.key === 'ArrowUp') {
                const prevTr = e.target.parentElement.parentElement.previousElementSibling;
                if (prevTr && prevTr.children[c+1]) prevTr.children[c+1].querySelector('.cell-input, .cell-select').focus();
            }
        });
    </script>
    <div id="customModalOverlay"></div>
    <div id="toastContainer"></div>
</body>
</html>
