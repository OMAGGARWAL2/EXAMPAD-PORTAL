<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Include DB and Auth for real functionality -->
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Roboto', sans-serif;
            background: #f1ede8;
            background-color: #f1ede8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-shape-organic {
            position: absolute;
            background: rgba(230, 222, 211, 0.5);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            z-index: -1;
            filter: blur(40px);
        }

        .org-shape1 {
            width: 800px;
            height: 800px;
            top: -100px;
            left: -200px;
        }

        .org-shape2 {
            width: 600px;
            height: 600px;
            bottom: -50px;
            right: -50px;
        }

        .top-left-logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 40px;
            height: 40px;
        }

        .top-left-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 10;
        }

        .test-info {
            flex: 1;
            padding-right: 80px;
        }

        .test-title {
            font-size: 1.6rem;
            font-weight: 500;
            color: #2b2b2b;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .progress-bar-container {
            display: flex;
            width: 100%;
            max-width: 250px;
            height: 6px;
            margin-bottom: 30px;
            border-radius: 3px;
            background: transparent;
            overflow: hidden;
        }

        .progress-left {
            width: 30%;
            background: #d3ba9a;
        }

        .progress-right {
            width: 70%;
            background: #a94121;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-line {
            font-size: 1.15rem;
            color: #2D3436;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .stat-value {
            color: #de6834;
            font-weight: 700;
        }

        .login-card {
            background: #fcfcfc;
            border-radius: 16px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
            border: 1px solid #fff;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 2rem;
            font-weight: 400;
            color: #2b2b2b;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 8px 0;
            border: none;
            border-bottom: 1px solid #ccc;
            background: transparent;
            font-size: 1rem;
            color: #222;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-bottom: 1px solid #c05126;
        }

        .eye-icon {
            position: absolute;
            right: 0;
            top: 32px;
            color: #a0a0a0;
            cursor: pointer;
        }

        .sign-in-btn {
            width: 100%;
            padding: 14px;
            background-color: #c05126;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .sign-in-btn:hover {
            background-color: #a0411d;
        }

        .forgot-link {
            text-align: center;
            display: block;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #888;
            text-decoration: none;
        }

        .forgot-link:hover {
            color: #c05126;
        }

        @media (max-width: 850px) {
            .container {
                flex-direction: column;
            }

            .test-info {
                padding-right: 0;
                margin-bottom: 50px;
                text-align: center;
            }

            .progress-bar-container {
                margin: 0 auto 30px;
            }

            .top-left-logo {
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body>
    <div class="bg-shape-organic org-shape1"></div>
    <div class="bg-shape-organic org-shape2"></div>

    <div class="top-left-logo">
        <img src="https://api.learntechww.com/college_icon/logo1733989968823.jpg" alt="Chitkara Logo">
    </div>

    <div class="container">
        <div class="test-info">
            <h1 class="test-title" style="font-size: 2.8rem; font-weight: 400; color: #2d3436; margin-bottom: 2rem;">Assessment Session</h1>
            
            <div class="progress-bar-container" style="max-width: 400px; height: 10px; margin-bottom: 3rem;">
                <!-- Split progress bar matching screenshot -->
                <div style="width: 60px; height: 100%; background: #ccc; opacity: 0.5;"></div>
                <div style="width: 100px; height: 100%; background: #bd8e6b;"></div>
                <div style="flex: 1; height: 100%; background: #de6834;"></div>
            </div>

            <div class="stats">
                <div class="stat-line">Total Questions <span class="stat-value" id="totQuestions">10</span></div>
                <div class="stat-line">Total Time <span class="stat-value" id="totTime">60 mins</span></div>
                <div class="stat-line">Max Marks <span class="stat-value" id="totMarks">20</span></div>
            </div>
        </div>

        <div class="login-card">
            <div class="card-title">sign in</div>

            <form id="signInForm" onsubmit="handleSignIn(event)">
                <div class="input-group">
                    <label>email or rollnumber *</label>
                    <input type="text" id="rollnumber" required>
                </div>

                <div class="input-group">
                    <label>password *</label>
                    <input type="password" id="password" required>
                    <i class="fas fa-eye-slash eye-icon" onclick="togglePass()"></i>
                </div>

                <div class="input-group">
                    <label>test code *</label>
                    <input type="text" id="testcode" required>
                </div>

                <button type="submit" class="sign-in-btn">sign in</button>
                <a href="#" class="forgot-link">forgot password?</a>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const examId = urlParams.get('testId');

            if (examId) {
                const exam = db.getExamById(examId);
                if (exam) {
                    document.getElementById('totQuestions').textContent = exam.questions ? exam.questions.length : '10';
                    document.getElementById('totTime').textContent = (exam.duration || 60) + ' mins';
                    document.getElementById('totMarks').textContent = exam.totalMarks || 20;
                    document.getElementById('testcode').value = exam.testId || '';
                }
            }
        });

        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        async function handleSignIn(e) {
            e.preventDefault();
            const roll = document.getElementById('rollnumber').value.trim();
            const pass = document.getElementById('password').value.trim();
            const code = document.getElementById('testcode').value.trim().toUpperCase();

            // 1. Validate Test Code
            const exam = db.getExamByTestId(code);
            if (!exam) {
                alert('Invalid Test Code! Please check your invite link.');
                return;
            }

            // 2. Perform Mock Login / Session Creation
            // In a real APP, auth.login() would verify against a database.
            // For now, we simulate a successful login for the provided roll number.
            let user = db.getUserByRollNo ? db.getUserByRollNo(roll) : null;
            if (!user) {
                // Auto-create a demo student user if they don't exist
                user = db.addUser({
                    id: 'std_' + roll,
                    name: 'CHITKARA STUDENT',
                    rollNo: roll,
                    email: roll + '@chitkara.edu.in',
                    role: 'student'
                });
            }
            
            // Log in the user
            const loginRes = auth.login(user.email, pass || '123456');
            
            // 3. Start Exam Attempt
            const attemptRes = db.startAttempt(exam.id, user.id);
            if (attemptRes.success) {
                window.location.href = 'exam-attempt.html?attemptId=' + attemptRes.attempt.id;
            } else if (attemptRes.existingAttempt) {
                // Resume existing attempt
                window.location.href = 'exam-attempt.html?attemptId=' + attemptRes.existingAttempt.id;
            } else {
                alert(attemptRes.message || 'Failed to start exam. Check if you already submitted.');
            }
        }
    </script>
</body>

</html>
