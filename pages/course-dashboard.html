<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exampad | Course Dashboard</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F26B3A;
            --primary-soft: #FFF1EC;
            --bg: #FFFFFF;
            --subtle: #F9FAFB;
            --border: #EAECF0;
            --text-main: #101828;
            --text-muted: #475467;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
        }

        /* Navigation Header */
        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: #d32f2f;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo i {
            background: #d32f2f;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .nav-tabs {
            display: flex;
            gap: 32px;
            height: 64px;
        }

        .nav-tab {
            height: 64px;
            display: flex;
            align-items: center;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Hero */
        .course-hero {
            padding: 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-hero h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .progress-box {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 300px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
            width: 0%;
            transition: width 1s;
        }

        .progress-label {
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        /* Modules Grid (Screen 3 style) */
        .learning-content {
            padding: 60px 40px;
            display: flex;
            overflow-x: auto;
            gap: 24px;
            padding-bottom: 20px;
        }

        .module-card {
            min-width: 280px;
            width: 280px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            position: relative;
        }

        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .module-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        .module-index {
            width: 32px;
            height: 32px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 32px;
        }

        .module-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            min-height: 3rem;
        }

        .module-stats {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .module-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Generic Toast */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toast {
            background: #333;
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s forwards;
            font-weight: 600;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="nav-left">
            <div class="logo" onclick="location.href='./student-dashboard.html'">
                <i class="fas fa-chart-line"></i> EXAMPAD
            </div>
            <div class="nav-tabs">
                <div class="nav-tab active">Learning Content</div>
                <div class="nav-tab" onclick="location.href='./course-attempts.html' + window.location.search">
                    Assignments</div>
                <div class="nav-tab">Achievements</div>
                <div class="nav-tab">Discussion</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <i class="far fa-bell" style="font-size: 1.2rem; color: var(--text-muted);"></i>
            <div
                style="width: 36px; height: 36px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
                O</div>
        </div>
    </header>

    <div class="course-hero">
        <h1 id="courseTitle">Loading Course...</h1>
        <div class="progress-box">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="overallFill"></div>
            </div>
            <span class="progress-label" id="overallLabel">0% done</span>
            <button class="btn" style="border:none; background:transparent; padding:10px; cursor:pointer;"
                onclick="downloadCourseReport()" title="Download Course Progress PDF">
                <i class="fas fa-file-pdf" style="font-size: 1.2rem; color: #d32f2f;"></i>
            </button>
        </div>
    </div>

    <div class="learning-content" id="moduleGrid">
        <!-- Module cards injected here -->
    </div>

    <div id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const courseId = params.get('courseId');
        const user = auth.getCurrentUser();

        function init() {
            const course = db.getCourseById(courseId);
            if (!course) {
                showToast("Course Not Found! Redirecting...", "error");
                setTimeout(() => window.location.href = './student-dashboard.html', 2000);
                return;
            }

            document.getElementById('courseTitle').textContent = course.title;
            const progress = db.getCourseProgress(courseId, user.id);
            const totalItems = course.modules.reduce((acc, m) => acc + m.items.length, 0);
            const completedCount = progress ? progress.completedItems.length : 0;
            const percentage = totalItems > 0 ? Math.round((completedCount / totalItems) * 100) : 0;

            document.getElementById('overallFill').style.width = percentage + '%';
            document.getElementById('overallLabel').textContent = percentage + '% done';

            renderModules(course, progress);
        }

        function renderModules(course, progress) {
            const grid = document.getElementById('moduleGrid');
            grid.innerHTML = course.modules.map((m, i) => {
                const totalInModule = m.items.length;
                const completedInModule = m.items.filter(item => progress?.completedItems.includes(item.id)).length;
                const isDone = completedInModule === totalInModule && totalInModule > 0;

                return `
                    <a href="./course-player.html?courseId=${course.id}&moduleIndex=${i}" class="module-card">
                        <div class="module-badge" style="color: ${isDone ? '#22c55e' : ''}">${isDone ? 'DONE' : ''}</div>
                        <div class="module-index">${i + 1}</div>
                        <div class="module-title">${m.title}</div>
                        <div class="module-stats">
                            <span><i class="far fa-file-video"></i> ${m.items.filter(it => it.type === 'video').length}</span>
                            <span><i class="far fa-question-circle"></i> ${m.items.filter(it => it.type === 'quiz' || it.type === 'coding').length}</span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'error') toast.style.borderLeft = '4px solid #D92D20';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function downloadCourseReport() {
            showToast("Generating PDF report...");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const course = db.getCourseById(courseId);
            if (!course) return;

            const progress = db.getCourseProgress(courseId, user.id);
            const attempts = db.getStudentAttempts(user.id);

            // Premium Header
            doc.setFillColor(242, 107, 58); // Primary
            doc.rect(0, 0, 210, 40, 'F');

            doc.setFont("Outfit", "bold");
            doc.setFontSize(24);
            doc.setTextColor(255, 255, 255);
            doc.text(course.title, 20, 25);

            doc.setFontSize(12);
            doc.setFont("Outfit", "normal");
            doc.text("Personal Learning Progress Report", 20, 33);

            let y = 60;

            // Student Meta
            doc.setTextColor(80, 80, 80);
            doc.setFontSize(10);
            doc.text(`Student: ${user.name || user.email}`, 20, y);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 150, y);
            y += 15;

            // Course Overview
            doc.setFontSize(16);
            doc.setTextColor(33, 33, 33);
            doc.text("Course Curriculum & Content", 20, y);
            y += 10;

            const splitDesc = doc.splitTextToSize(course.description || "Comprehensive learning journey on Exampad.", 170);
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(splitDesc, 20, y);
            y += (splitDesc.length * 5) + 15;

            // Content Breakdown
            course.modules.forEach((mod, mIdx) => {
                if (y > 260) { doc.addPage(); y = 20; }

                doc.setFontSize(13);
                doc.setTextColor(242, 107, 58);
                doc.text(`Module ${mIdx + 1}: ${mod.title}`, 20, y);
                y += 8;

                mod.items.forEach((item, iIdx) => {
                    if (y > 270) { doc.addPage(); y = 20; }

                    doc.setFontSize(11);
                    doc.setTextColor(50, 50, 50);
                    doc.text(`${mIdx + 1}.${iIdx + 1} ${item.title} (${item.type.toUpperCase()})`, 25, y);

                    // Status Check
                    const isDone = progress?.completedItems.includes(item.id);
                    doc.setFontSize(9);
                    if (isDone) {
                        doc.setTextColor(34, 197, 94);
                        doc.text("COMPLETED", 170, y);
                    } else {
                        doc.setTextColor(150, 150, 150);
                        doc.text("PENDING", 170, y);
                    }

                    y += 6;

                    if (item.type === 'article' && item.data.body) {
                        const temp = document.createElement('div');
                        temp.innerHTML = item.data.body;
                        const text = temp.innerText || temp.textContent;
                        const splitBody = doc.splitTextToSize(text, 165);
                        doc.setFontSize(9);
                        doc.setTextColor(100, 100, 100);
                        doc.text(splitBody, 30, y);
                        y += (splitBody.length * 4.5) + 10;
                    } else if (item.type === 'quiz' || item.type === 'coding') {
                        const attempt = attempts.find(a => a.examId === item.data.examId);
                        if (attempt) {
                            const scoreText = attempt.score ? `Score: ${attempt.score.score}/${attempt.score.totalMarks} (${attempt.score.percentage}%)` : "Pending grade";
                            doc.setFontSize(9);
                            doc.setTextColor(34, 197, 94);
                            doc.text(`Result: ${scoreText}`, 30, y);
                            y += 6;

                            if (item.type === 'coding' && attempt.responses) {
                                // Show snippet of code
                                const firstKey = Object.keys(attempt.responses)[0];
                                const code = attempt.responses[firstKey]?.value || "";
                                if (code) {
                                    const snippet = "USER CODE SNIPPET:\n" + code.substring(0, 150) + (code.length > 150 ? '...' : '');
                                    const splitSnippet = doc.splitTextToSize(snippet, 150);
                                    doc.setFontSize(8);
                                    doc.setTextColor(150, 150, 150);
                                    doc.text(splitSnippet, 35, y);
                                    y += (splitSnippet.length * 3.5) + 6;
                                }
                            }
                        } else {
                            y += 4;
                        }
                    } else {
                        y += 4;
                    }
                });
                y += 10;
            });

            doc.save(`${course.title.replace(/\s+/g, '_')}_Report.pdf`);
            showToast("Report Downloaded Successfully!");
        }

        init();
    </script>
</body>

</html>
