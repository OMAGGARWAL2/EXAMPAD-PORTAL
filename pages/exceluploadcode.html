<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalkpad ERP | Coding Question Architect</title>
    <!-- ERP Styles & Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b5998;
            --primary-dark: #2d4373;
            --primary-light: #eef2f7;
            --erp-bg: #e8ecf3;
            --erp-border: #d0d7e5;
            --erp-text: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--erp-bg);
            font-family: Tahoma, Arial, sans-serif;
            color: var(--erp-text);
            font-size: 12px;
        }

        /* ERP Layout */
        .erp-topbar {
            background-color: var(--primary);
            color: white;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            font-size: 11px;
            height: 35px;
            gap: 15px;
        }

        .erp-container {
            max-width: 1300px;
            margin: 10px auto;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            min-height: 85vh;
        }

        .breadcrumb {
            font-size: 10px;
            margin-bottom: 8px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .erp-section-title {
            background: var(--primary-light);
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            border: 1px solid var(--erp-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--erp-border);
            border-radius: 2px;
            font-family: inherit;
            font-size: 12px;
            box-sizing: border-box;
        }

        .rich-editor-container {
            border: 1px solid var(--erp-border);
            height: 200px;
            margin-bottom: 15px;
        }

        /* Table Architect Styling */
        .architect-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border: 1px solid var(--erp-border);
        }

        .architect-table th {
            background: var(--primary-light);
            color: var(--primary);
            font-size: 11px;
            padding: 8px;
            text-align: left;
            border-bottom: 2px solid var(--erp-border);
            border-right: 1px solid var(--erp-border);
        }

        .architect-table td {
            padding: 8px;
            border: 1px solid #eee;
            vertical-align: top;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
            font-weight: bold;
            background: #eee;
        }

        /* Test Case Matrix */
        .testcase-row {
            background: #fafafa;
        }

        /* Ace Editor Embedding */
        .ace-cell-editor {
            height: 120px;
            width: 100%;
            border: 1px solid #ddd;
        }

        /* Controls */
        .btn {
            padding: 5px 15px;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            background: #f5f5f5;
            color: #333;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary-dark); }
        .btn-success { background: #28a745; color: white; border-color: #1e7e34; }
        .btn-danger { background: #dc3545; color: white; border-color: #a71d2a; }

        .btn:hover { opacity: 0.9; }

        #customModalOverlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: #fff; width: 600px; border: 1px solid #333; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
        .modal-header { background: var(--primary); color: white; padding: 10px 15px; font-weight: bold; font-size: 13px; }
        .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
        .modal-actions { background: #f5f5f5; padding: 10px 15px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid #ddd; }

        #toastContainer { position: fixed; bottom: 20px; right: 20px; z-index: 11000; }
        .toast { background: #333; color: #fff; padding: 10px 20px; border-radius: 2px; font-size: 12px; margin-top: 5px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .editor-label {
            font-size: 10px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 10px;
            display: block;
            background: #eee;
            padding: 2px 5px;
            border: 1px solid #ddd;
        }

        .lang-card {
            border: 1px solid var(--erp-border);
            margin-bottom: 20px;
            padding: 15px;
            background: #fff;
        }

        .lang-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .selected-cell { background: var(--primary-light) !important; box-shadow: inset 0 0 0 1px var(--primary); }
        .cell-container { position: relative; }
        .cell-content { width: 100%; height: 100%; min-height: 40px; padding: 8px; border: none; outline: none; background: transparent; font-family: inherit; font-size: 11px; white-space: pre-wrap; overflow-wrap: break-word; }
        .cell-content:focus { background: #fff; box-shadow: inset 0 0 0 1px var(--primary); z-index: 5; }
        .selection-active { user-select: none; }
    </style>
</head>
<body>

<div class="erp-topbar">
    <span>Session Jan-Jun 2026 | Admin Portal</span>
    <i class="fas fa-home" style="cursor:pointer;" onclick="location.href='index.html'"></i>
    <i class="fas fa-sign-out-alt" style="cursor:pointer;"></i>
</div>

<div class="erp-container">
    <div class="breadcrumb">Home » <span onclick="location.href='exam-creator.html'" style="cursor:pointer;">Exam Creator</span> » <b>Coding Architect</b></div>
    
    <div class="erp-section-title">
        <div><i class="fas fa-code"></i> Coding Question Architect (Institutional Matrix)</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="discardChanges()"><i class="fas fa-times"></i> Discard</button>
            <button class="btn btn-primary" onclick="syncCodingQuestion()"><i class="fas fa-sync"></i> Synchronize Question</button>
        </div>
    </div>

    <!-- Metadata Section -->
    <div class="form-grid">
        <div class="form-group">
            <label for="q_title">Question Title / Number</label>
            <input type="text" id="q_title" placeholder="e.g. Q1. Matrix Rotation Algorithm">
        </div>
        <div class="form-group">
            <label for="q_marks">Total Marks Allocated</label>
            <input type="number" id="q_marks" value="10">
        </div>
    </div>

    <label>Problem Description (Rich Text Editor)</label>
    <div id="editor-container" class="rich-editor-container"></div>

    <!-- Test Cases Section -->
    <div class="erp-section-title" style="margin-top: 30px; font-size: 11px;">
        <div><i class="fas fa-vial"></i> Test Case Matrix (Samples & Hidden)</div>
    </div>
    <div class="grid-wrapper" style="overflow-x: auto;">
        <table class="architect-table">
            <thead>
                <tr>
                    <th style="width: 120px;">Category</th>
                    <th>Input Data (Standard)</th>
                    <th>Expected Output</th>
                    <th style="width: 100px; text-align: center;">Marks</th>
                    <th style="width: 60px; text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="testCaseMatrix"></tbody>
        </table>
    </div>
    <div style="margin-top: 10px;">
        <button class="btn" style="background: #eef7ff; color: var(--primary);" onclick="addNewTestCase(false)"><i class="fas fa-plus"></i> Add Hidden Case</button>
        <button class="btn" style="background: #f6ffed; color: #52c41a;" onclick="addNewTestCase(true)"><i class="fas fa-eye"></i> Add Sample Case</button>
    </div>

    <!-- Language & Boilerplate Architect -->
    <div class="erp-section-title" style="margin-top: 30px; font-size: 11px;">
        <div><i class="fas fa-laptop-code"></i> Polyglot Boilerplate Architect</div>
        <div style="display:flex; gap:5px;">
            <select id="langSelector" style="width:120px; font-size:11px;">
                <option value="python">Python 3</option>
                <option value="java">Java 17</option>
                <option value="cpp">C++ 20</option>
                <option value="javascript">JavaScript</option>
                <option value="c">C (GCC)</option>
            </select>
            <button class="btn btn-primary" style="padding: 2px 8px;" onclick="addLanguageFromSelector()"><i class="fas fa-plus"></i> Add Language</button>
        </div>
    </div>
    
    <div id="languageArchitect">
        <!-- Languages will be added here -->
    </div>

</div>

<!-- Scripts -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.10.1/ace.js"></script>
<script src="../js/db.js"></script>
<script>
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline'],
                ['image', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    const languages = [
        { id: 'python', name: 'Python 3' },
        { id: 'java', name: 'Java 17' },
        { id: 'cpp', name: 'C++ 20' },
        { id: 'javascript', name: 'JavaScript (Node)' },
        { id: 'c', name: 'C (GCC)' }
    ];

    let activeLangs = [];
    const langArchitect = document.getElementById('languageArchitect');

    let isSelecting = false;
    let selectionStart = { r: 0, c: 0 };
    let selectionEnd = { r: 0, c: 0 };

    function addNewTestCase(isSample = false) {
        const matrix = document.getElementById('testCaseMatrix');
        const rowIndex = matrix.children.length;
        const row = document.createElement('tr');
        row.className = 'testcase-row';
        if (isSample) row.style.background = '#f6ffed';
        
        row.innerHTML = `
            <td class="cell-container" data-row="${rowIndex}" data-col="0">
                <div class="cell-content" contenteditable="true" data-key="type" data-row="${rowIndex}" data-col="0">${isSample ? 'Sample' : 'Hidden'}</div>
            </td>
            <td class="cell-container" data-row="${rowIndex}" data-col="1">
                <div class="cell-content" contenteditable="true" data-key="input" data-row="${rowIndex}" data-col="1" placeholder="Input..."></div>
            </td>
            <td class="cell-container" data-row="${rowIndex}" data-col="2">
                <div class="cell-content" contenteditable="true" data-key="output" data-row="${rowIndex}" data-col="2" placeholder="Output..."></div>
            </td>
            <td class="cell-container" data-row="${rowIndex}" data-col="3">
                <div class="cell-content" contenteditable="true" data-key="marks" data-row="${rowIndex}" data-col="3" style="text-align:center;">${isSample ? 0 : 2}</div>
            </td>
            <td style="text-align: center; vertical-align: middle;">
                <button class="btn btn-danger" style="padding:2px 5px;" onclick="removeRow(this)"><i class="fas fa-trash-alt"></i></button>
            </td>
        `;
        matrix.appendChild(row);

        const inputs = row.querySelectorAll('.cell-content');
        inputs.forEach(input => {
            input.addEventListener('mousedown', startSelection);
            input.addEventListener('mouseover', updateSelection);
            input.addEventListener('paste', handlePasteTC);
            input.addEventListener('focus', () => clearSelection());
        });
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        // Re-index rows
        document.querySelectorAll('#testCaseMatrix tr').forEach((tr, i) => {
            tr.querySelectorAll('.cell-container, .cell-content').forEach(el => {
                el.dataset.row = i;
            });
        });
    }

    function startSelection(e) {
        if (e.shiftKey) return;
        isSelecting = true;
        const target = e.target.closest('.cell-container');
        if (!target) return;
        const row = parseInt(target.dataset.row);
        const col = parseInt(target.dataset.col);
        selectionStart = { r: row, c: col };
        selectionEnd = { r: row, c: col };
        updateSelectionStyles();
    }

    function updateSelection(e) {
        if (!isSelecting) return;
        const target = e.target.closest('.cell-container');
        if (!target) return;
        const row = parseInt(target.dataset.row);
        const col = parseInt(target.dataset.col);
        selectionEnd = { r: row, c: col };
        updateSelectionStyles();
    }

    function updateSelectionStyles() {
        clearSelection();
        const matrix = document.getElementById('testCaseMatrix');
        const minR = Math.min(selectionStart.r, selectionEnd.r);
        const maxR = Math.max(selectionStart.r, selectionEnd.r);
        const minC = Math.min(selectionStart.c, selectionEnd.c);
        const maxC = Math.max(selectionStart.c, selectionEnd.c);

        for (let r = minR; r <= maxR; r++) {
            const tr = matrix.children[r];
            if (!tr) continue;
            const containers = tr.querySelectorAll('.cell-container');
            for (let c = minC; c <= maxC; c++) {
                const td = containers[c];
                if (td) td.classList.add('selected-cell');
            }
        }
    }

    function clearSelection() {
        document.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
    }

    window.addEventListener('mouseup', () => { isSelecting = false; });

    function handlePasteTC(e) {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== '');
        const targetContainer = e.target.closest('.cell-container');
        const startR = parseInt(targetContainer.dataset.row);
        const startC = parseInt(targetContainer.dataset.col);
        const matrix = document.getElementById('testCaseMatrix');

        rows.forEach((rowText, rOffset) => {
            const targetR = startR + rOffset;
            if (!matrix.children[targetR]) addNewTestCase(false);
            
            const tr = matrix.children[targetR];
            const columns = rowText.split('\t');
            
            columns.forEach((colText, cOffset) => {
                const targetC = startC + cOffset;
                const containers = tr.querySelectorAll('.cell-container');
                if (containers[targetC]) {
                    const content = containers[targetC].querySelector('.cell-content');
                    if (content) {
                        content.innerText = colText.trim();
                        if (targetC === 0) { // Auto-highlight Sample
                            if (colText.toLowerCase().includes('sample')) {
                                tr.style.background = '#f6ffed';
                            } else {
                                tr.style.background = '';
                            }
                        }
                    }
                }
            });
        });
    }

    function renderInitialTestCases() {
        addNewTestCase(true); // One Sample
        addNewTestCase(false); // One Hidden
        addNewTestCase(false); // Second Hidden
    }

    function addLanguageFromSelector() {
        const langId = document.getElementById('langSelector').value;
        addLanguageRow(langId);
    }

    function addLanguageRow(langId) {
        const langRef = languages.find(l => l.id === langId) || { id: langId, name: langId.toUpperCase() };
        if (activeLangs.includes(langRef.id)) {
            showToast("This language is already in the architect matrix!");
            return;
        }

        activeLangs.push(langRef.id);
        const card = document.createElement('div');
        card.className = 'lang-card';
        card.innerHTML = `
            <div class="lang-header">
                <div style="font-weight:bold; color:var(--primary);">
                    <i class="fas fa-terminal"></i> ${langRef.name.toUpperCase()} BOILERPLATES
                </div>
                <button class="btn btn-danger" style="padding:2px 8px;" onclick="removeLang('${langRef.id}', this)"><i class="fas fa-trash"></i> Remove Language</button>
            </div>
            <div class="code-matrix">
                <div>
                    <span class="editor-label">FIXED UPPER CODE (Read-only for student)</span>
                    <div id="editor_upper_${langRef.id}" class="ace-cell-editor"></div>
                </div>
                <div>
                    <span class="editor-label">EDITABLE MIDDLE CODE (Student starting point)</span>
                    <div id="editor_mid_${langRef.id}" class="ace-cell-editor"></div>
                </div>
                <div>
                    <span class="editor-label">FIXED LOWER CODE (Implicit main/footer)</span>
                    <div id="editor_lower_${langRef.id}" class="ace-cell-editor"></div>
                </div>
            </div>
        `;
        langArchitect.appendChild(card);

        // Initialize Ace Editors
        setupAce(`editor_upper_${langRef.id}`, langRef.id);
        setupAce(`editor_mid_${langRef.id}`, langRef.id);
        setupAce(`editor_lower_${langRef.id}`, langRef.id);
    }

    function setupAce(id, langId) {
        let mode = "ace/mode/python";
        if (langId === 'java') mode = "ace/mode/java";
        if (langId === 'cpp' || langId === 'c') mode = "ace/mode/c_cpp";
        if (langId === 'javascript') mode = "ace/mode/javascript";

        const editor = ace.edit(id);
        editor.setTheme("ace/theme/chrome");
        editor.session.setMode(mode);
        editor.setOptions({
            fontSize: "14px",
            showPrintMargin: false,
            highlightActiveLine: true
        });
        // Store reference
        window[`ace_${id}`] = editor;
    }

    function removeLang(id, btn) {
        showConfirmModal("Confirm Language Removal", `Are you sure you wish to remove the ${id.toUpperCase()} boilerplate? All written code for this language will be lost.`, () => {
            activeLangs = activeLangs.filter(l => l !== id);
            btn.closest('.lang-card').remove();
            showToast(`${id.toUpperCase()} removed from architect matrix.`);
        });
    }

    function clearTC(btn) {
        const row = btn.closest('tr');
        row.querySelectorAll('textarea').forEach(t => t.value = '');
        row.querySelector('input').value = 0;
    }

    function discardChanges() {
        showConfirmModal("Discard Architect Drafting", "This will erase all current coding architect state. Are you sure?", () => {
            location.href = 'exam-creator.html';
        });
    }

    function syncCodingQuestion() {
        const title = document.getElementById('q_title').value;
        const totalMarks = document.getElementById('q_marks').value;
        const description = quill.root.innerHTML;

        if(!title) { 
            showToast("Question Title is required!");
            const titleInput = document.getElementById('q_title');
            titleInput.style.borderColor = 'red';
            titleInput.focus();
            return; 
        }

        const testCasesMatrix = [];
        document.querySelectorAll('#testCaseMatrix tr').forEach(row => {
            const cells = row.querySelectorAll('.cell-content');
            if (cells.length < 4) return;
            
            const type = cells[0].innerText.trim().toLowerCase();
            const input = cells[1].innerText.trim();
            const output = cells[2].innerText.trim();
            const marks = parseInt(cells[3].innerText.trim()) || 0;
            
            if(input || output) {
                testCasesMatrix.push({
                    input: input,
                    output: output,
                    marks: marks,
                    isSample: type.includes('sample')
                });
            }
        });

        const langBoilerplates = {};
        activeLangs.forEach(langId => {
            langBoilerplates[langId] = {
                prefix: window[`ace_editor_upper_${langId}`].getValue(),
                starter: window[`ace_editor_mid_${langId}`].getValue(),
                suffix: window[`ace_editor_lower_${langId}`].getValue()
            };
        });

        const codingQuestion = {
            id: 'code_' + Date.now(),
            type: 'coding',
            title: title,
            description: description,
            marks: parseInt(totalMarks),
            testCases: testCasesMatrix,
            boilerplates: langBoilerplates,
            category: 'Coding Architect Draft'
        };

        // Save to temporary storage
        const exams = JSON.parse(localStorage.getItem('exampad_creator_temp')) || { questions: [], sections: ['General'] };
        exams.questions.push(codingQuestion);
        localStorage.setItem('exampad_creator_temp', JSON.stringify(exams));

        // Sync with global pool if db is available
        if (typeof db !== 'undefined' && db.addToQuestionPool) {
            db.addToQuestionPool(codingQuestion);
        }

        showToast("Coding Matrix Synchronized Successfully!");
        setTimeout(() => location.href = 'exam-creator.html', 1500);
    }

    function showToast(msg) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = '#333';
        toast.style.color = '#fff';
        toast.style.padding = '10px 20px';
        toast.style.marginTop = '10px';
        toast.style.borderLeft = '4px solid var(--primary)';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function showConfirmModal(title, desc, onConfirm) {
        const overlay = document.getElementById('customModalOverlay');
        overlay.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">CONFIRM ACTION</div>
                <div class="modal-body">
                    <div style="font-weight:bold; margin-bottom:10px; font-size:14px;">${title}</div>
                    <div style="font-size:12px; line-height:1.4;">${desc}</div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-ghost" id="modalCancelBtn">Cancel</button>
                    <button class="btn btn-primary" id="modalConfirmBtn">Proceed</button>
                </div>
            </div>
        `;
        overlay.style.display = 'flex';
        document.getElementById('modalCancelBtn').onclick = () => { overlay.style.display = 'none'; };
        document.getElementById('modalConfirmBtn').onclick = () => { onConfirm(); overlay.style.display = 'none'; };
    }

    // Initial setup
    renderInitialTestCases();

    document.addEventListener('keydown', (e) => {
        const target = e.target.closest('.cell-content');
        if (!target) return;

        const r = parseInt(target.dataset.row);
        const c = parseInt(target.dataset.col);
        const matrix = document.getElementById('testCaseMatrix');

        if (e.shiftKey && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            e.preventDefault();
            if (e.key === 'ArrowUp') selectionEnd.r = Math.max(0, selectionEnd.r - 1);
            if (e.key === 'ArrowDown') selectionEnd.r = Math.min(matrix.children.length - 1, selectionEnd.r + 1);
            if (e.key === 'ArrowLeft') selectionEnd.c = Math.max(0, selectionEnd.c - 1);
            if (e.key === 'ArrowRight') selectionEnd.c = Math.min(3, selectionEnd.c + 1);
            updateSelectionStyles();
            return;
        }

        if (e.key === 'ArrowRight' && (window.getSelection().anchorOffset === target.innerText.length || e.ctrlKey)) {
            const nextTd = target.parentElement.nextElementSibling;
            if (nextTd && nextTd.querySelector('.cell-content')) nextTd.querySelector('.cell-content').focus();
        } else if (e.key === 'ArrowLeft' && (window.getSelection().anchorOffset === 0 || e.ctrlKey)) {
            const prevTd = target.parentElement.previousElementSibling;
            if (prevTd && prevTd.querySelector('.cell-content')) prevTd.querySelector('.cell-content').focus();
        } else if (e.key === 'ArrowDown' && !e.shiftKey) {
            const nextTr = target.parentElement.parentElement.nextElementSibling;
            if (nextTr && nextTr.children[c]) nextTr.children[c].querySelector('.cell-content').focus();
        } else if (e.key === 'ArrowUp' && !e.shiftKey) {
            const prevTr = target.parentElement.parentElement.previousElementSibling;
            if (prevTr && prevTr.children[c]) prevTr.children[c].querySelector('.cell-content').focus();
        }
    });
</script>
<div id="customModalOverlay"></div>
<div id="toastContainer"></div>
</body>
</html>
