<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exampad | Your Results</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/theme-engine.js"></script>
    <style>
        :root {
            --primary: #D35400;
            /* Deep EXAMPAD Orange */
            --accent: #E67E22;
            --success: #12B76A;
            --bg: #F9FAFB;
            --border: #EAECF0;
            --radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: #101828;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-page {
            width: 100%;
            max-width: 1000px;
            background: #fff;
            min-height: 100vh;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .result-header {
            background: #fff;
            padding: 60px 80px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .brand-box h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -2px;
            margin-bottom: 4px;
        }

        .brand-box p {
            color: #475467;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .score-circle-area {
            text-align: center;
        }

        .score-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FFF5ED;
        }

        .score-val {
            font-family: 'Outfit';
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            color: var(--primary);
        }

        .score-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-body {
            padding: 60px 80px;
            flex: 1;
        }

        .stats-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: #F9FAFB;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #667085;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        .stat-val {
            font-family: 'Outfit';
            font-size: 1.8rem;
            font-weight: 800;
            color: #101828;
        }

        .breakdown-section h3 {
            font-family: 'Outfit';
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: #101828;
        }

        .q-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .q-row:hover {
            border-color: var(--primary);
            background: #FFF5ED;
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .q-id {
            width: 40px;
            height: 40px;
            background: #F2F4F7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #475467;
        }

        .q-title {
            font-weight: 700;
            font-size: 1rem;
            color: #101828;
        }

        .q-status {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .q-points {
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .footer-bar {
            background: #F9FAFB;
            padding: 40px 80px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-return {
            background: #101828;
            color: #fff;
            padding: 16px 36px;
            border-radius: 12px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn-return:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>
    <div class="result-page">
        <header class="result-header">
            <div class="brand-box">
                <h1 id="examName">Assessment.</h1>
                <p id="studentName">Candidate: Loading...</p>
            </div>
            <div class="score-circle-area">
                <div class="score-ring">
                    <div class="score-val" id="finalScore">--</div>
                    <div class="score-label">Points</div>
                </div>
            </div>
        </header>

        <main class="result-body">
            <div class="stats-strip">
                <div class="stat-card">
                    <span class="stat-label">Percentage Curve</span>
                    <span class="stat-val" id="percVal">--%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Module items</span>
                    <span class="stat-val" id="totalQ">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Validation Status</span>
                    <span class="stat-val" style="color:var(--success)">VERIFIED</span>
                </div>
            </div>

            <div class="breakdown-section">
                <h3>Detailed Performance Matrix</h3>
                <div id="breakdownList">
                    <!-- Breakdown items -->
                </div>
            </div>
        </main>

        <footer class="footer-bar">
            <div style="color:#667085; font-size:0.9rem; font-weight:600;">
                <i class="fas fa-check-double" style="color:var(--success); margin-right:8px;"></i> Official Academic
                Transcript
            </div>
            <a href="./student-dashboard.html" class="btn-return">Exit to Dashboard</a>
        </footer>
    </div>

    <!-- Question Details Modal -->
    <div id="qModal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); z-index:1000; align-items:center; justify-content:center; padding:20px;">
        <div
            style="background:#fff; border-radius:24px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; padding:40px; box-shadow:0 25px 50px rgba(0,0,0,0.2); animation: fadeInUp 0.3s ease-out;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 style="font-family:'Outfit'; font-weight:800; color:#101828;">Question Analysis</h2>
                <button onclick="closeModal()"
                    style="border:none; background:#F2F4F7; width:40px; height:40px; border-radius:12px; cursor:pointer; color:#475467;"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="modalContent">
                <!-- Data injected here -->
            </div>
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const attemptId = urlParams.get('attemptId');
        const attempt = db.getAttempt(attemptId);

        if (!attempt) {
            alert("Result data not found.");
            window.location.href = './student-dashboard.html';
        }

        const exam = db.getExamById(attempt.examId);
        const user = auth.getCurrentUser();

        function init() {
            if (!exam.resultsPublished) {
                alert("This result has not been published yet.");
                window.location.href = './student-dashboard.html';
                return;
            }

            const scoreObj = db.calculateScore(attempt);

            document.getElementById('examName').textContent = exam.title;
            document.getElementById('studentName').textContent = `Candidate: ${user.name.toUpperCase()}`;
            document.getElementById('finalScore').textContent = scoreObj.score;
            document.getElementById('percVal').textContent = scoreObj.percentage + '%';
            document.getElementById('totalQ').textContent = exam.questions.length;

            renderBreakdown(scoreObj);
        }

        function renderBreakdown(scoreObj) {
            const list = document.getElementById('breakdownList');
            list.innerHTML = exam.questions.map((q, i) => {
                const response = attempt.responses[q.id];
                const isAuto = !['subjective', 'file_upload'].includes(q.type);
                const mark = response?.manualMark !== undefined ? response.manualMark : (isAuto ? (db.checkAnswer(q, response) ? q.marks : 0) : 'Pending');
                const isCorrect = mark > 0 || mark === q.marks;

                return `
                    <div class="q-row" onclick="viewQuestionDetails('${q.id}')" style="cursor:pointer;">
                        <div class="q-meta">
                            <div class="q-id">${i + 1}</div>
                            <div>
                                <div class="q-title">${q.heading || 'Assessment Question'}</div>
                                <div class="q-status" style="color:${isCorrect ? 'var(--success)' : '#D92D20'}">
                                    ${mark === 'Pending' ? 'MANUAL REVIEW' : (isCorrect ? 'CORRECT / AWARDED' : 'INCORRECT')}
                                </div>
                            </div>
                        </div>
                        <div class="q-points">${mark} <span style="font-size:0.8rem; opacity:0.5;">/ ${q.marks}</span></div>
                    </div>
                `;
            }).join('');
        }

        function viewQuestionDetails(qId) {
            const q = exam.questions.find(item => item.id === qId);
            const response = attempt.responses[qId];
            const isAuto = !['subjective', 'file_upload'].includes(q.type);
            const mark = response?.manualMark !== undefined ? response.manualMark : (isAuto ? (db.checkAnswer(q, response) ? q.marks : 0) : 'Pending');
            const isCorrect = mark > 0 || mark === q.marks;

            const modal = document.getElementById('qModal');
            const content = document.getElementById('modalContent');

            let studentAnsText = response ? (typeof response === 'object' ? (response.value || response.code || 'No response') : response) : 'No response';
            let correctAnsText = q.correctAnswer || q.correctNumeric || q.correctCode || 'Manual review required';

            // Special handling for MCQ labels
            if (q.type === 'mcq' && q.options) {
                const sOpt = q.options.find(o => o.id === studentAnsText);
                const cOpt = q.options.find(o => o.id === correctAnsText);
                if (sOpt) studentAnsText = sOpt.text;
                if (cOpt) correctAnsText = cOpt.text;
            }

            content.innerHTML = `
                <div style="margin-bottom:32px;">
                    <label style="font-size:0.75rem; font-weight:800; color:#667085; text-transform:uppercase; letter-spacing:1px;">Question</label>
                    <div style="font-size:1.1rem; color:#101828; font-weight:600; margin-top:8px; line-height:1.6;">${q.text || q.heading}</div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:32px;">
                    <div style="padding:20px; border-radius:16px; background:#F9FAFB; border:1px solid #EAECF0;">
                        <label style="font-size:0.7rem; font-weight:800; color:#667085; text-transform:uppercase; letter-spacing:1px;">Your Response</label>
                        <div style="font-weight:700; color:${isCorrect ? 'var(--success)' : '#D92D20'}; margin-top:8px;">${studentAnsText}</div>
                    </div>
                    <div style="padding:20px; border-radius:16px; background:#F6FEF9; border:1px solid #D1FADF;">
                        <label style="font-size:0.7rem; font-weight:800; color:#067647; text-transform:uppercase; letter-spacing:1px;">Correct Reference</label>
                        <div style="font-weight:700; color:#067647; margin-top:8px;">${correctAnsText}</div>
                    </div>
                </div>

                <div style="padding:20px; border-radius:16px; border:1px solid #EAECF0; background:#F9FAFB;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:700; color:#475467;">Points Awarded</span>
                        <span style="font-family:'JetBrains Mono'; font-weight:800; font-size:1.2rem; color:var(--primary);">${mark} / ${q.marks}</span>
                    </div>
                    \${q.explanation ? \`
                        <div style="margin-top:16px; padding-top:16px; border-top:1px solid #EAECF0;">
                            <label style="font-size:0.7rem; font-weight:800; color:#667085; text-transform:uppercase;">Explanation</label>
                            <div style="margin-top:8px; font-size:0.9rem; line-height:1.5; color:#475467;">\${q.explanation}</div>
                        </div>
                    \` : ''}
                </div>
            `;

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('qModal').style.display = 'none';
        }

        // Close on outside click
        window.onclick = function (event) {
            const modal = document.getElementById('qModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        init();
    </script>
</body>

</html>
