<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTPAD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@200;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050A;
            --gold: #D4AF37;
            --peach: #FFDAB9;
            --ethereal: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            transition: background 3s ease;
        }

        canvas#magicCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .cursor {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 20px #fff, 0 0 40px var(--gold);
            transition: transform 0.1s;
        }

        /* --- ENTRANCE --- */
        #gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s, visibility 2s;
        }

        .gate-title {
            font-family: 'Marcellus', serif;
            font-size: 60px;
            letter-spacing: 20px;
            margin-bottom: 20px;
            animation: glowText 4s infinite alternate;
        }

        @keyframes glowText { from { opacity: 0.3; } to { opacity: 1; } }

        .gate-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'Marcellus', serif;
            font-size: 24px;
            text-align: center;
            margin-bottom: 40px;
            outline: none;
            width: 350px;
        }

        /* --- SANCTUARY --- */
        .sanctuary {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            opacity: 0;
            transition: opacity 3s;
            position: relative;
            z-index: 10;
            scrollbar-width: none;
        }

        .sanctuary::-webkit-scrollbar { display: none; }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 100px;
            text-align: center;
            scroll-snap-align: start;
            position: relative;
        }

        /* Music Cards */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .music-card {
            background: var(--ethereal);
            padding: 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .music-card:hover, .music-card.active {
            background: rgba(255,255,255,0.15);
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        /* SEND PEACE BUTTON */
        .send-peace-wrap {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .peace-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.5s;
            cursor: pointer;
        }

        .peace-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .peace-label {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Success Transmuted */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

    </style>
</head>
<body oncontextmenu="return false;">

    <div class="cursor" id="cursor"></div>
    <canvas id="magicCanvas"></canvas>

    <!-- SEND PEACE -->
    <div class="send-peace-wrap">
        <div class="peace-btn" onclick="sendPeace(event)">
            <i class="fas fa-dove"></i>
        </div>
        <div class="peace-label">Send Peace</div>
    </div>

    <!-- ENTRANCE -->
    <div id="gate">
        <div class="gate-panel" style="text-align: center;">
            <div class="gate-title">OASIS</div>
            <p id="visit-msg" style="font-size: 10px; letter-spacing: 3px; opacity: 0.4; margin-bottom: 40px;"></p>
            <input type="text" id="userName" class="gate-input" placeholder="Whisper your name..." maxlength="15">
            <button class="music-card" style="padding: 15px 50px; font-size: 11px; letter-spacing: 5px; border-radius: 40px;" onclick="enterSanctuary()">MANIFEST</button>
        </div>
    </div>

    <!-- SANCTUARY -->
    <div class="sanctuary" id="sanctuary">
        
        <nav style="position: fixed; top: 40px; left: 80px; z-index: 1000;">
            <div style="font-family: Marcellus; font-size: 18px; letter-spacing: 5px;">OASIS.</div>
        </nav>

        <!-- WELCOME -->
        <section>
            <h1 style="font-family: Marcellus; font-size: 100px; font-weight: 300;" id="greet">Welcome.</h1>
            <p style="opacity: 0.3; letter-spacing: 12px; margin-top: 20px;">OTHERS ARE HEALING HERE WITH YOU.</p>
            <p style="font-size: 10px; margin-top: 40px; opacity: 0.4;">12 SOULS RELEASED TODAY</p>
        </section>

        <!-- AMBIENT SOUNDS -->
        <section>
            <h2 style="font-family: Marcellus; font-size: 40px; margin-bottom: 20px;">Choose your stillness.</h2>
            <div class="music-grid">
                <div class="music-card" onclick="setAmbiance('rain')">
                    <i class="fas fa-cloud-showers-heavy"></i>
                    <p style="margin-top: 10px; font-size: 11px; letter-spacing: 2px;">SOFT RAIN</p>
                </div>
                <div class="music-card" onclick="setAmbiance('ocean')">
                    <i class="fas fa-water"></i>
                    <p style="margin-top: 10px; font-size: 11px; letter-spacing: 2px;">DEEP OCEAN</p>
                </div>
                <div class="music-card" onclick="setAmbiance('hum')">
                    <i class="fas fa-atom"></i>
                    <p style="margin-top: 10px; font-size: 11px; letter-spacing: 2px;">SPACE HUM</p>
                </div>
                <div class="music-card" onclick="setAmbiance('wind')">
                    <i class="fas fa-wind"></i>
                    <p style="margin-top: 10px; font-size: 11px; letter-spacing: 2px;">SOLAR WIND</p>
                </div>
            </div>
        </section>

        <!-- AI SOUL JOURNEY -->
        <section>
            <h2 style="font-family: Marcellus; margin-bottom: 50px;">A Conversation with the Stars.</h2>
            <textarea id="soul-text" oninput="aiListen(event)" style="width: 100%; max-width: 600px; height: 100px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 24px; text-align: center; font-family: Marcellus; outline: none;" placeholder="What is your soul saying today?"></textarea>
            <div id="ai-resp" style="font-family: Marcellus; font-size: 24px; font-style: italic; margin-top: 30px; opacity: 0; transition: opacity 1.5s;">"The stars are listening to you."</div>
            <button class="music-card" style="margin-top: 50px; padding: 15px 50px; border-radius: 40px;" onclick="releaseFinal()">DISSOLVE & LET GO</button>
        </section>

    </div>

    <!-- SUCCESS -->
    <div id="overlay">
        <h1 style="font-family: Marcellus; font-size: 100px; font-style: italic;">Transmuted.</h1>
        <button class="music-card" style="margin-top: 60px; padding: 15px 40px;" onclick="location.href='erp.html'">Return to Reality</button>
    </div>

    <!-- AUDIO -->
    <audio id="snd-rain" loop src="https://cdn.pixabay.com/audio/2022/03/10/audio_f574d618d2.mp3"></audio>
    <audio id="snd-ocean" loop src="https://cdn.pixabay.com/audio/2021/08/04/audio_73145465e1.mp3"></audio>

    <script>
        // --- MEMORY & ENGINE ---
        let memory = {
            name: localStorage.getItem("o_name") || "",
            visits: parseInt(localStorage.getItem("o_visits")) || 0,
            stars: JSON.parse(localStorage.getItem("o_stars")) || [],
        };

        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        let particles = [];
        let glitters = [];
        let mouse = { x: 0, y: 0 };
        
        function enterSanctuary() {
            memory.name = document.getElementById('userName').value || "Friend";
            localStorage.setItem("o_name", memory.name);
            document.getElementById('greet').innerText = `Welcome, ${memory.name}.`;
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.visibility = 'hidden';
                document.getElementById('sanctuary').style.opacity = '1';
            }, 2000);
        }

        // --- MOUSE & GLITTER ---
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if(Math.random() > 0.5) createGlitter(e.clientX, e.clientY);
        });

        function createGlitter(x, y, isPeace = false) {
            const count = isPeace ? 500 : 1;
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = isPeace ? (Math.random() * 15 + 2) : (Math.random() * 2);
                glitters.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * (isPeace ? 5 : 2) + 1,
                    alpha: 1,
                    color: isPeace ? (Math.random() > 0.5 ? '#E0F2F1' : '#FFFFFF') : (Math.random() > 0.5 ? '#D4AF37' : '#FFFFFF'),
                    life: isPeace ? (Math.random() * 0.01 + 0.002) : 0.02
                });
            }
        }

        function sendPeace(e) {
            const rect = e.target.getBoundingClientRect();
            createGlitter(rect.left + rect.width/2, rect.top + rect.height/2, true);
            
            // WOW moment: Screen Flash
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'white';
            flash.style.opacity = '0';
            flash.style.zIndex = '10000';
            flash.style.pointerEvents = 'none';
            document.body.appendChild(flash);
            
            flash.animate([
                { opacity: 0.15 },
                { opacity: 0 }
            ], { duration: 1000 }).onfinish = () => flash.remove();

            // Notification
            const msg = document.createElement('div');
            msg.innerText = "THE UNIVERSE FEELS YOUR PEACE.";
            msg.style.position = 'fixed';
            msg.style.bottom = '120px';
            msg.style.left = '40px';
            msg.style.fontSize = '9px';
            msg.style.letterSpacing = '5px';
            msg.style.opacity = '0';
            msg.style.color = 'var(--gold)';
            document.body.appendChild(msg);
            
            msg.animate([
                { opacity: 0, transform: 'translateY(10px)' },
                { opacity: 1, transform: 'translateY(0)' },
                { opacity: 0, transform: 'translateY(-20px)' }
            ], { duration: 5000 }).onfinish = () => msg.remove();
        }

        // --- ANIMATION ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = glitters.length - 1; i >= 0; i--) {
                const g = glitters[i];
                ctx.globalAlpha = g.alpha;
                ctx.fillStyle = g.color;
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.size, 0, Math.PI * 2);
                ctx.fill();
                g.x += g.vx; g.y += g.vy; g.alpha -= g.life;
                if(g.alpha <= 0) glitters.splice(i, 1);
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(animate);
        }
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        animate();

        // --- AUDIO ---
        function setAmbiance(type) {
            document.querySelectorAll('audio').forEach(a => a.pause());
            if(type === 'rain') document.getElementById('snd-rain').play();
            if(type === 'ocean') document.getElementById('snd-ocean').play();
        }

        function aiListen(e) {
            document.getElementById('ai-resp').style.opacity = '1';
        }

        function releaseFinal() {
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
