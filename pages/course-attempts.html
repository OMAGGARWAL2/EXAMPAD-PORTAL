<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exampad | Practice Attempts</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Hind:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F26B3A;
            --bg: #FFFFFF;
            --subtle: #F9FAFB;
            --border: #EAECF0;
            --text-main: #101828;
            --text-muted: #475467;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Hind', sans-serif;
        }

        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: #d32f2f;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo i {
            background: #d32f2f;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .nav-tabs {
            display: flex;
            gap: 32px;
            height: 64px;
        }

        .nav-tab {
            height: 64px;
            display: flex;
            align-items: center;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Content Context */
        .content-area {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 4px;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 20px;
        }

        .select-box {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            background: #f8f8f8;
            font-weight: 600;
            color: #555;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        /* Attempts Table - Screen 5 style */
        .attempts-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .attempts-table th {
            background: #fff;
            text-align: left;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 1.15rem;
            font-weight: 600;
            color: #222;
        }

        .attempts-table td {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
            font-size: 1.05rem;
        }

        .attempts-table tr:last-child td {
            border-bottom: none;
        }

        .q-name {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .q-index {
            color: #444;
            width: 24px;
        }

        .q-title {
            font-weight: 400;
            color: #333;
        }

        .type-badge {
            font-weight: 400;
            font-size: 1.05rem;
            color: #444;
        }

        .status-cell {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-text.submitted {
            color: #555;
        }

        .status-text.not-submitted {
            color: #555;
        }

        .status-chevron {
            color: var(--primary);
            font-size: 0.7rem;
        }

        /* Generic Toast */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toast {
            background: #333;
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s forwards;
            font-weight: 600;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="nav-left">
            <div class="logo-box" onclick="location.href='./student-dashboard.html'" style="cursor: pointer;">
                <img src="../Tests _ Chitkara_files/chitkara.a1beb7f0.png" style="height: 32px;">
            </div>
            <div class="nav-tabs">
                <div class="nav-tab" onclick="goBack()">Learning Content</div>
                <div class="nav-tab active">Assignments</div>
                <div class="nav-tab">Achievements</div>
                <div class="nav-tab">Discussion</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div
                style="width: 36px; height: 36px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
                O</div>
        </div>
    </header>

    <div class="content-area">
        <h2 class="page-title">Attempts</h2>

        <div class="filter-bar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <label style="color: #999; font-weight: 600; font-size: 0.9rem;">Select Course</label>
                <select class="select-box" id="courseSelect">
                    <!-- Options injected here -->
                </select>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Search question" id="qSearch">
                <i class="fas fa-search"></i>
            </div>
        </div>

        <table class="attempts-table">
            <thead>
                <tr>
                    <th style="width: 50%;">Questions</th>
                    <th style="width: 20%;">Type</th>
                    <th style="width: 30%;">Status</th>
                </tr>
            </thead>
            <tbody id="attemptsBody">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let courseId = params.get('courseId');
        const user = auth.getCurrentUser();

        function init() {
            const courses = db.getAllCourses();
            if (!courses || courses.length === 0) return;

            // Default to the first course if courseId is not in the URL
            if (!courseId) {
                courseId = courses[0].id;
            }

            const select = document.getElementById('courseSelect');
            select.innerHTML = courses.map(c => `
                <option value="${c.id}" ${c.id === courseId ? 'selected' : ''}>${c.title}</option>
            `).join('');

            select.onchange = (e) => {
                courseId = e.target.value;
                renderAttempts();
            };

            renderAttempts();
        }

        function renderAttempts() {
            const course = db.getCourseById(courseId);
            if (!course) return;

            const allLessons = course.modules.flatMap(m => m.lessons || []).filter(l => l.type === 'coding' || l.type === 'mcq');
            
            const body = document.getElementById('attemptsBody');
            
            if (allLessons.length === 0) {
                body.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color:#888;">No lessons found for this course.</td></tr>`;
                return;
            }

            body.innerHTML = allLessons.map((less, i) => {
                const historyStr = localStorage.getItem('exampad_attempts_' + less.id);
                let history = [];
                if (historyStr) {
                    try { history = JSON.parse(historyStr); } catch(e) {}
                }

                let typeLabel = 'Coding';
                if (less.type === 'mcq') typeLabel = 'MCQ';

                const isSubmitted = history.length > 0;
                const statusLabel = isSubmitted ? 'Submitted' : 'Not Submitted';
                
                let detailsHTML = '';
                if (isSubmitted) {
                    const allCount = history.length;
                    const successCount = history.filter(h => h.status === 'success').length;
                    const failCount = history.filter(h => h.status === 'failed').length;
                    const errCount = history.filter(h => h.status === 'error').length;

                    detailsHTML = `
                        <tr id="details-${less.id}" style="display: none; background: #fff; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                            <td colspan="3" style="padding: 24px 40px; border-bottom: 1px solid #f0f0f0;">
                                <div style="display: flex; gap: 24px; align-items: center; justify-content: center; margin-bottom: 24px; font-size: 0.95rem; color: #888;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="filter-${less.id}" checked> ALL (${allCount})
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="filter-${less.id}"> ${less.type === 'mcq' ? 'Incorrect' : 'Failed'} (${failCount})
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="filter-${less.id}"> ${less.type === 'mcq' ? 'Correct' : 'Successful'} (${successCount})
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="filter-${less.id}"> Compile error (${errCount})
                                    </label>
                                </div>
                                
                                <table style="width: 100%; border-collapse: collapse; text-align: center;">
                                    <thead>
                                        <tr>
                                            <th style="padding-bottom: 16px; font-weight: 600; font-size: 1.15rem; color: #111; text-align: center; background: none; border: none;">Attempts</th>
                                            <th style="padding-bottom: 16px; font-weight: 600; font-size: 1.15rem; color: #111; text-align: center; background: none; border: none;">Test cases</th>
                                            <th style="padding-bottom: 16px; font-weight: 600; font-size: 1.15rem; color: #111; text-align: center; background: none; border: none;">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${history.map(att => {
                                            const d = new Date(att.date);
                                            const dateStr = d.toLocaleDateString('en-GB') + ' | ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                            
                                            let statColor = '#555';
                                            let displayStatus = att.status;
                                            
                                            if (att.status === 'success') {
                                                statColor = '#027A48';
                                                if (att.type === 'mcq') displayStatus = 'correct';
                                            } else if (att.status === 'failed') {
                                                statColor = '#B42318';
                                                if (att.type === 'mcq') displayStatus = 'incorrect';
                                            } else if (att.status === 'error') {
                                                statColor = '#DE6834';
                                            }

                                            let tcases = 'N/A';
                                            if (att.type === 'coding' && att.status !== 'error') {
                                                tcases = att.passed + '/' + att.total;
                                            }

                                            return `
                                                <tr>
                                                    <td style="padding: 16px 0; color: #333; font-size: 1.05rem; border: none;">${dateStr}</td>
                                                    <td style="padding: 16px 0; color: #333; font-size: 1.05rem; border: none;">${tcases}</td>
                                                    <td style="padding: 16px 0; color: ${statColor}; font-size: 1.05rem; border: none;">${displayStatus}</td>
                                                </tr>
                                            `;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </td>
                        </tr>
                    `;
                }

                return `
                    <tr style="cursor: pointer; transition: background 0.2s;" onclick="const el = document.getElementById('details-${less.id}'); if(el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background='transparent'">
                        <td>
                            <div class="q-name">
                                <span class="q-index">${i + 1}.</span>
                                <span class="q-title">${less.title}</span>
                            </div>
                        </td>
                        <td><span class="type-badge">${typeLabel}</span></td>
                        <td>
                            <div class="status-cell" style="justify-content: flex-start; gap: 12px;">
                                <span class="status-text" style="font-weight: 400; color: #333;">
                                    ${statusLabel}
                                </span>
                                ${isSubmitted ? '<i class="fas fa-caret-down" style="color: #DE6834; font-size: 1rem;"></i>' : ''}
                            </div>
                        </td>
                    </tr>
                    ${detailsHTML}
                `;
            }).join('');
        }

        function goBack() {
            window.location.href = `./course-dashboard.html?courseId=${courseId}`;
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'error') toast.style.borderLeft = '4px solid #D92D20';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        init();
    </script>
</body>

</html>
